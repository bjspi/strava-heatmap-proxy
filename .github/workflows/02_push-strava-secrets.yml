name: 02 Manually Push Strava AUTH to CF

on:
  workflow_dispatch: {}

jobs:
  push-strava-secrets:
    runs-on: ubuntu-latest
    name: Push Strava secrets to Cloudflare
    steps:
      - uses: actions/checkout@v4

      - name: Validate required GitHub secrets
        shell: bash
        env:
          STRAVA_ID: ${{ secrets.STRAVA_ID }}
          STRAVA_COOKIES: ${{ secrets.STRAVA_COOKIES }}
        run: |
          if [ -z "$STRAVA_ID" ]; then
            echo "Missing GitHub repository secret: STRAVA_ID"
            exit 1
          fi

          if [ -z "$STRAVA_COOKIES" ]; then
            echo "Missing GitHub repository secret: STRAVA_COOKIES"
            exit 1
          fi

      - name: Push STRAVA_ID and STRAVA_COOKIES to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          apiToken: ${{ secrets.CF_API_TOKEN }}
          secrets: |
            STRAVA_ID
            STRAVA_COOKIES
        env:
          STRAVA_ID: ${{ secrets.STRAVA_ID }}
          STRAVA_COOKIES: ${{ secrets.STRAVA_COOKIES }}
