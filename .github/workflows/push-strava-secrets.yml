name: Manually Push Strava AUTH to CF

on:
  workflow_dispatch: {}

jobs:
  push-strava-secrets:
    runs-on: ubuntu-latest
    name: Push Strava secrets to Cloudflare
    steps:
      - name: Push STRAVA_ID and STRAVA_COOKIES to Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          apiToken: ${{ secrets.CF_API_TOKEN }}
          secrets: |
            STRAVA_ID
            STRAVA_COOKIES
